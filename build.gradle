plugins {
    id 'java'
    id 'checkstyle'
}

repositories {
    mavenLocal()
    maven {
        url = 'https://repo.runelite.net'
        content {
            includeGroupByRegex("net\\.runelite.*")
        }
    }
    mavenCentral()
}

def runeLiteVersion = 'latest.release'
def pluginMainClass = 'com.trackpadcamera.TrackpadCameraPluginLauncher'

dependencies {
    compileOnly group: 'net.runelite', name: 'client', version: runeLiteVersion

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:4.11.0'
    testImplementation group: 'net.runelite', name: 'client', version: runeLiteVersion
    testImplementation group: 'net.runelite', name: 'jshell', version: runeLiteVersion
}

group = 'com.trackpadcamera'
version = '1.0.0'

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release.set(11)
}

// Allow reflection into MouseWheelEvent's private fields (used by invertZoom).
// On Java 11 this is a no-op warning; on Java 17+ it is required for setAccessible.
def reflectionOpenArg = '--add-opens=java.desktop/java.awt.event=ALL-UNNAMED'

test {
    jvmArgs reflectionOpenArg
    // Use the same Java 11 toolchain as the run task for consistent behaviour
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(11)
    }
}

tasks.register('run', JavaExec) {
    classpath = sourceSets.test.runtimeClasspath
    mainClass = pluginMainClass

    jvmArgs '-ea'
    jvmArgs reflectionOpenArg
    // Expose JDWP for VS Code debugger attach (port 5005)
    jvmArgs '-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005'

    args '--developer-mode'

    // RuneLite's JAR verification is incompatible with Java 17+.
    // Use Java 11 at runtime; Gradle will auto-download it if not installed.
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(11)
    }
}

checkstyle {
    maxWarnings = 0
    toolVersion = '9.3'
    configFile = file("${rootDir}/checkstyle/checkstyle.xml")
}
